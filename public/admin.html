<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin - Radio Ao Vivo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; }
    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 0;
      margin: 8px 0;
      font-size: 16px;
    }
    input { background: #020617; color: white; border: 1px solid #334155; }
    button { cursor: pointer; font-weight: bold; }
    #loginBtn { background: #38bdf8; color: #082f49; }
    #startBtn { background: #22c55e; color: #052e16; }
    #stopBtn { background: #ef4444; color: white; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .status { padding: 12px; background: #020617; border-radius: 12px; margin: 14px 0; color: #cbd5e1; }
    .hidden { display: none; }
    .meter { height: 12px; background: #020617; border-radius: 999px; overflow: hidden; margin-top: 12px; }
    .bar { height: 100%; width: 0%; background: #22c55e; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Painel Admin</h1>

    <section id="loginArea">
      <p>Digite a senha para acessar a transmissão.</p>
      <input id="password" type="password" placeholder="Senha do admin" />
      <button id="loginBtn">Entrar</button>
    </section>

    <section id="adminArea" class="hidden">
      <div class="status" id="statusBox">Pronto para iniciar.</div>
      <button id="startBtn">Iniciar transmissão</button>
      <button id="stopBtn" disabled>Parar transmissão</button>
      <p>Ouvintes conectados: <strong id="listeners">0</strong></p>
      <div class="meter"><div id="bar" class="bar"></div></div>
      <p style="color:#94a3b8">Dica: use fone de ouvido para evitar eco.</p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const loginArea = document.getElementById('loginArea');
    const adminArea = document.getElementById('adminArea');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('password');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusBox = document.getElementById('statusBox');
    const listenersText = document.getElementById('listeners');
    const bar = document.getElementById('bar');

    let localStream = null;
    const peers = new Map();

    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    loginBtn.onclick = () => {
      socket.emit('admin-auth', passwordInput.value, (response) => {
        if (!response.ok) {
          alert(response.message || 'Nao foi possivel entrar.');
          return;
        }
        loginArea.classList.add('hidden');
        adminArea.classList.remove('hidden');
      });
    };

    socket.on('status', (status) => {
      listenersText.textContent = status.listeners || 0;
    });

    startBtn.onclick = async () => {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        socket.emit('start-live');
        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusBox.textContent = 'Transmitindo ao vivo.';
        startAudioMeter(localStream);
      } catch (error) {
        alert('Nao foi possivel acessar o microfone. Verifique as permissoes do navegador.');
      }
    };

    stopBtn.onclick = () => {
      socket.emit('stop-live');
      stopAll();
      statusBox.textContent = 'Transmissao encerrada.';
    };

    socket.on('listener-ready', async (listenerId) => {
      if (!localStream) return;

      const pc = new RTCPeerConnection(rtcConfig);
      peers.set(listenerId, pc);

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', { to: listenerId, candidate: event.candidate });
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('offer', { to: listenerId, offer });
    });

    socket.on('answer', async ({ from, answer }) => {
      const pc = peers.get(from);
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
    });

    socket.on('ice-candidate', async ({ from, candidate }) => {
      const pc = peers.get(from);
      if (pc && candidate) await pc.addIceCandidate(new RTCIceCandidate(candidate));
    });

    socket.on('listener-disconnected', (listenerId) => {
      const pc = peers.get(listenerId);
      if (pc) pc.close();
      peers.delete(listenerId);
    });

    function stopAll() {
      peers.forEach(pc => pc.close());
      peers.clear();
      if (localStream) localStream.getTracks().forEach(track => track.stop());
      localStream = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      bar.style.width = '0%';
    }

    function startAudioMeter(stream) {
      const audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(stream);
      const analyser = audioContext.createAnalyser();
      const data = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);

      function tick() {
        if (!localStream) return;
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        bar.style.width = Math.min(100, avg * 2) + '%';
        requestAnimationFrame(tick);
      }
      tick();
    }
  </script>
</body>
</html>
